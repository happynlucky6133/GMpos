<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GMPos">
<meta name="description" content="GMPos 库存管理系统">
<title>GMPos 库存系统</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== 登录页面 ===== -->
<div class="page" id="page-login">
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-logo">📦</div>
        <div class="login-title">GMPos 库存系统</div>
        <div class="login-sub" id="login-sub">请登录以继续</div>
        <div class="form-group">
          <label class="form-label" id="label-user">用户名</label>
          <input type="text" id="login-user" placeholder="输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" id="label-pass">密码</label>
          <input type="password" id="login-pass" placeholder="输入密码" autocomplete="current-password">
        </div>
        <button class="btn-primary" id="login-btn" style="margin-top:8px">登录</button>
        <div id="login-error" style="color:var(--danger);font-size:13px;text-align:center;margin-top:8px;display:none"></div>
        <div style="display:flex;justify-content:center;gap:12px;margin-top:16px">
          <button class="lang-btn" data-lang="zh" style="font-size:20px;background:none;border:1px solid var(--border);border-radius:8px;padding:4px 12px;cursor:pointer;opacity:0.5">🇨🇳 中文</button>
          <button class="lang-btn" data-lang="id" style="font-size:20px;background:none;border:1px solid var(--border);border-radius:8px;padding:4px 12px;cursor:pointer;opacity:0.5">🇮🇩 Indonesia</button>
          <button class="lang-btn" data-lang="en" style="font-size:20px;background:none;border:1px solid var(--border);border-radius:8px;padding:4px 12px;cursor:pointer;opacity:0.5">🇬🇧 English</button>
        </div>
      </div>
    </div>
</div>

<!-- ===== 主应用 ===== -->
<div class="app" id="app-main">
  <div class="header">
    <div>
      <div class="header-title">GMPos 库存</div>
      <div class="header-sub" id="sync-time">正在加载...</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span id="user-display" style="font-size:12px;color:var(--text2);cursor:pointer"></span>
      <span id="admin-actions" style="display:none">
        <button class="link-btn" id="btn-add-user">👤+</button>
        <button class="link-btn" id="btn-change-pw">🔑</button>
      </span>
      <button class="sync-btn" id="sync-btn">↻ Refresh</button>
    </div>
  </div>

  <div class="content">
    <!-- 主页 -->
    <div class="page active" id="page-dashboard">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">产品总类</div><div class="stat-value" id="s-products">-</div></div>
        <div class="stat-card"><div class="stat-label">总库存</div><div class="stat-value" id="s-stock"><span id="s-stock-num">-</span></div></div>
        <div class="stat-card"><div class="stat-label">进货记录</div><div class="stat-value" id="s-stockin">-</div></div>
        <div class="stat-card"><div class="stat-label">供应商</div><div class="stat-value" id="s-suppliers">-</div></div>
      </div>
      <div class="section-title">库存概览</div>
      <div id="dash-products"><div class="loading">加载中...</div></div>
      <div class="section-title">最近进货</div>
      <div id="dash-recent"><div class="loading">加载中...</div></div>
    </div>

    <!-- 产品 -->
    <div class="page" id="page-products">
      <div class="search-wrap">
        <span style="font-size:16px;color:var(--text2)">🔍</span>
        <input type="text" placeholder="搜索产品..." id="product-search">
      </div>
      <div id="product-list"><div class="loading">加载中...</div></div>
    </div>

    <!-- 进货 -->
    <div class="page" id="page-stockin">
      <div class="section-title">进货记录</div>
      <div class="search-wrap" style="margin-bottom:8px;gap:6px">
        <input type="date" id="stockin-date" style="flex:0 0 auto;width:155px;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text1);font-size:13px">
        <span style="font-size:16px;color:var(--text2)">🔍</span>
        <input type="text" placeholder="搜索 DO 号码..." id="stockin-search" style="flex:1">
      </div>
      <div id="stockin-list"><div class="loading">加载中...</div></div>
    </div>

    <!-- 出货 -->
    <div class="page" id="page-orders">
      <div class="section-title">出货</div>
      <div class="search-wrap" style="margin-bottom:8px;gap:6px">
        <input type="date" id="order-date" style="flex:0 0 auto;width:155px;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text1);font-size:13px">
        <span style="font-size:16px;color:var(--text2)">🔍</span>
        <input type="text" placeholder="搜索 Invoice No..." id="order-search" style="flex:1">
      </div>
      <div id="orders-list"><div class="loading">加载中...</div></div>
    </div>

    <!-- 业绩报表 -->
    <div class="page" id="page-report">
      <div class="section-title">业绩报表</div>
      <div class="search-wrap" style="margin-bottom:12px">
        <input type="date" id="report-date" style="flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text1);font-size:14px">
        <button id="btn-report-query" style="padding:8px 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">查询</button>
      </div>
      <div id="report-result"><div class="empty">选择日期查询业绩</div></div>
    </div>

    <!-- 供应商 -->
    <div class="page" id="page-suppliers">
      <div class="search-wrap">
        <span style="font-size:16px;color:var(--text2)">🔍</span>
        <input type="text" placeholder="搜索供应商..." id="supplier-search">
      </div>
      <div id="supplier-list"><div class="loading">加载中...</div></div>
    </div>


  </div>

  <div class="nav" id="nav-bar">
    <button class="nav-btn active" data-page="dashboard"><span class="nav-icon">🏠</span>主页</button>
    <button class="nav-btn" data-page="products"><span class="nav-icon">📦</span>产品</button>
    <button class="nav-btn" data-page="stockin"><span class="nav-icon">📥</span>进货</button>
    <button class="nav-btn" data-page="orders"><span class="nav-icon">📋</span>出货</button>
    <button class="nav-btn" data-page="report"><span class="nav-icon">📊</span>业绩</button>
    <button class="nav-btn" data-page="suppliers"><span class="nav-icon">🏭</span>供应商</button>
  </div>
</div>

<button class="fab" id="fab">+</button>
<div class="toast" id="toast"></div>

<!-- 进货 Modal -->
<!-- 进货 Modal (multi-item pending→confirm) -->
<div class="modal-bg" id="modal-si">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">新增进货</div>
    <!-- Supplier selection (header-level) -->
    <div class="form-group">
      <label class="form-label" id="lbl-si-supplier">供应商</label>
      <select id="f-sup"></select>
    </div>
    <div class="form-group"><label class="form-label" id="lbl-si-do">DO No</label><input type="text" id="f-docno" placeholder="例如 DO84621"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="form-group"><label class="form-label" id="lbl-si-from">From Branch</label><input type="text" id="f-from-branch" placeholder="HQ / KL"></div>
      <div class="form-group"><label class="form-label" id="lbl-si-to">To Branch</label><input type="text" id="f-to-branch" placeholder="YP"></div>
    </div>
    <!-- New item row area -->
    <div id="si-new-row-area" class="form-group">
      <div style="display:flex;gap:6px;align-items:end;flex-wrap:wrap">
        <div style="flex:1;min-width:120px"><label class="form-label" id="lbl-si-product">产品</label><select id="f-prod"></select></div>
        <div style="width:80px"><label class="form-label" id="f-qty-label">数量</label><input type="number" id="f-qty" placeholder="0" min="1" inputmode="numeric" style="width:100%"></div>
        <div style="width:90px"><label class="form-label" id="lbl-si-unitprice">单价 (RM)</label><input type="number" id="f-si-price" placeholder="0.00" min="0" step="0.01" inputmode="decimal" style="width:100%"></div>
        <button class="btn-secondary" type="button" id="btn-si-add-item" style="margin-bottom:4px;white-space:nowrap;padding:11px 10px;flex:0 0 auto">+ 添加</button>
      </div>
    </div>
    <!-- Pending items list -->
    <div id="si-pending-items"></div>
    <!-- Optional total amount -->
    <div class="form-group"><label class="form-label" id="lbl-si-amount">总金额 (RM)</label><input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal"></div>
    <!-- Edit mode: multi-row fill -->
    <div id="si-edit-rows"></div>
    <input type="hidden" id="f-editing-siid" value="">
    <button class="btn-primary" id="btn-si">确认进货</button>
    <button class="btn-cancel" id="btn-si-cancel">取消</button>
  </div>
</div>

<!-- 新增产品 Modal -->
<div class="modal-bg" id="modal-prod">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">新增产品</div>
    <div class="form-group"><label class="form-label" id="lbl-prod-name">产品名称</label><input type="text" id="np-name" placeholder="输入产品名称"></div>
    <div class="form-group"><label class="form-label" id="lbl-prod-grade">等级</label><input type="text" id="np-grade" placeholder="输入等级（如 A、B、C 或自定义）"></div>
    <div class="form-group"><label class="form-label" id="lbl-prod-unit">单位</label><select id="np-unit"><option>kg</option><option>box</option><option>pcs</option></select></div>
    <button class="btn-primary" id="btn-prod">添加产品</button>
    <button class="btn-cancel" id="btn-prod-cancel">取消</button>
  </div>
</div>

<!-- 编辑产品 Modal -->
<div class="modal-bg" id="modal-edit-prod">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">编辑产品</div>
    <input type="hidden" id="ep-id" value="">
    <div class="form-group"><label class="form-label">产品名称</label><input type="text" id="ep-name" placeholder="输入产品名称"></div>
    <div class="form-group"><label class="form-label">等级</label><input type="text" id="ep-grade" placeholder="输入等级"></div>
    <div class="form-group"><label class="form-label">单位</label><select id="ep-unit"><option>kg</option><option>box</option><option>pcs</option></select></div>
    <div class="form-group"><label class="form-label">库存数量</label><input type="number" id="ep-stock" placeholder="0" min="0" step="0.01" inputmode="decimal"></div>
    <button class="btn-primary" id="btn-edit-prod">保存更改</button>
    <button class="btn-cancel" id="btn-edit-prod-cancel">取消</button>
  </div>
</div>

<!-- 合并 SKU Modal -->
<div class="modal-bg" id="modal-merge-sku">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">合并 SKU</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">将旧 SKU 的产品、历史记录和库存合并到目标 SKU，然后删除旧 SKU。此操作不可撤销！</p>
    <div class="form-group"><label class="form-label">旧 SKU (要合并掉的)</label>
      <select id="ms-from"></select>
    </div>
    <div class="form-group"><label class="form-label">目标 SKU (合并到它)</label>
      <select id="ms-to"></select>
    </div>
    <div id="ms-preview" style="font-size:12px;color:var(--text2);margin-bottom:12px;padding:8px;background:var(--amber-light);border-radius:8px"></div>
    <button class="btn-primary" id="btn-merge-sku" style="background:var(--red)">确认合并</button>
    <button class="btn-cancel" id="btn-merge-sku-cancel">取消</button>
  </div>
</div>

<!-- 新增供应商 Modal -->
<div class="modal-bg" id="modal-supplier">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">新增供应商</div>
    <div class="form-group"><label class="form-label" id="lbl-sup-name">供应商名称</label><input type="text" id="ns-name" placeholder="输入供应商名称"></div>
    <div class="form-group"><label class="form-label" id="lbl-sup-phone">联系电话（可选）</label><input type="text" id="ns-phone" placeholder="例：012-3456789" inputmode="tel"></div>
    <div class="form-group"><label class="form-label" id="lbl-sup-note">备注（可选）</label><input type="text" id="ns-note" placeholder="地址或其他备注"></div>
    <button class="btn-primary" id="btn-supplier">添加供应商</button>
    <button class="btn-cancel" id="btn-supplier-cancel">取消</button>
  </div>
</div>

<!-- 出货 Modal -->
<div class="modal-bg" id="modal-order">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">出货</div>
    <div class="form-group"><label class="form-label" id="lbl-order-type">单据类型</label><select id="o-type"><option value="pos_sale">POS 出货</option><option value="branch_transfer">分行调货</option></select></div>
    <div class="form-group" id="order-invoice-field"><label class="form-label" id="lbl-order-invoice">母公司 POS Invoice No</label><input type="text" id="o-poid" placeholder="可留空，之后也能补"></div>
    <div id="order-transfer-fields" style="display:none">
      <div class="form-group"><label class="form-label" id="lbl-order-do">DO No</label><input type="text" id="o-docno" placeholder="例如 DO77069"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="form-group"><label class="form-label" id="lbl-order-from">From Branch</label><input type="text" id="o-from-branch" placeholder="YP"></div>
        <div class="form-group"><label class="form-label" id="lbl-order-to">To Branch</label><input type="text" id="o-to-branch" placeholder="BP"></div>
      </div>
    </div>
    <div class="form-group"><label class="form-label" id="lbl-order-amount">总金额 (RM)</label><input type="number" id="o-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal" readonly></div>
    <div id="order-item-editor"></div>
    <button class="btn-secondary" type="button" id="btn-order-add-item">+ 添加产品</button>
    <input type="hidden" id="o-editing-poid" value="">
    <input type="hidden" id="o-editing-detailid" value="">
    <button class="btn-primary" id="btn-order">出货</button>
    <button class="btn-cancel" id="btn-order-cancel">取消</button>
  </div>
</div>

<!-- 新增用户 Modal -->
<div class="modal-bg" id="modal-adduser">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">新增用户</div>
    <div class="form-group"><label class="form-label" id="lbl-au-user">用户名</label><input type="text" id="au-user" placeholder="输入登录用户名"></div>
    <div class="form-group"><label class="form-label" id="lbl-au-display">显示名称</label><input type="text" id="au-display" placeholder="输入显示名称"></div>
    <div class="form-group"><label class="form-label" id="lbl-au-pass">密码</label><input type="password" id="au-pass" placeholder="输入密码"></div>
    <div class="form-group"><label class="form-label" id="lbl-au-role">角色</label>
      <select id="au-role">
        <option value="admin">👑 管理员</option>
        <option value="sales">📋 销售员</option>
      </select>
    </div>
    <button class="btn-primary" id="btn-adduser">添加用户</button>
    <button class="btn-cancel" id="btn-adduser-cancel">取消</button>
  </div>
</div>

<!-- 修改密码 Modal -->
<div class="modal-bg" id="modal-changepw">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">修改密码</div>
    <div class="form-group"><label class="form-label" id="lbl-cp-old">当前密码</label><input type="password" id="cp-old" placeholder="输入当前密码"></div>
    <div class="form-group"><label class="form-label" id="lbl-cp-new">新密码</label><input type="password" id="cp-new" placeholder="输入新密码"></div>
    <div class="form-group"><label class="form-label" id="lbl-cp-confirm">确认新密码</label><input type="password" id="cp-confirm" placeholder="再次输入新密码"></div>
    <button class="btn-primary" id="btn-changepw">修改密码</button>
    <button class="btn-cancel" id="btn-changepw-cancel">取消</button>
  </div>
</div>

<script src="v2.js?v=6"></script>
<script src="app.js?v=6"></script>
</body>
</html>
